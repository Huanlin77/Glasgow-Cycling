<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Glasgow Cycling Analysis</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    /* ===== GLOBAL ===== */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #ffffff;
    }

    .top-bar {
      display: flex;
      justify-content: space-between; /* espace entre gauche et droite */
      align-items: center;            /* alignement vertical */
      max-width: 1500px;
      margin: 0px auto;
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      max-width: 350px;
      margin: 20px auto ;
      gap: 15px;
      padding: 10px;
      background-color: #005EB8;
      border-radius: 2px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      text-align: center;           /* assure que le texte est centré */
    } 

    .header h1 {
      font-size: 28px;
      margin: 0;
      line-height: 1.2;
      color: #ffffff;
    }

    /* ===== MAP ===== */
    #main-map {
      width: 100%;
      height: 77vh;
    }

    /* ===== LINKS (BUTTONS) ===== */
    .links {
      padding: 15px;
      text-align: right;
      background-color: #ffffff;
    }

    .links a {
      display: inline-block;
      margin: 10px 20px;
      padding: 15px 30px;
      font-size: 20px;
      font-weight: bold;
      color: white;
      background-color: #28a745;
      text-decoration: underline;
      border-radius: 8px;
      transition: transform 0.2s, background-color 0.2s;
    }

    .links a:hover {
      background-color: #218838;
      transform: scale(1.1);
    }

  </style>
</head>

<body>

<!-- ===== MAP ===== -->
<div id="main-map"></div>

<!-- NEW WRAPPER -->
<div class="top-bar">
  <div class="header">
    <h1>Glasgow Cycling Analysis<br>2025</h1>
  </div>

  <div class="links">
    <a href="Cycling_Infrastructure.html">Cycling Infrastructure</a>
    <a href="Statistic_insight.html">Statistic Insight</a>
    <a href="Cycling_Animation.html">Cycling Animation</a>
  </div>
</div>


<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // Initialiser la carte centrée sur Glasgow
  var map = L.map('main-map').setView([55.8642, -4.2518], 12);

  // Couche OpenCycleMap (meilleure pour vélo 🚴)
  L.tileLayer('https://api.thunderforest.com/outdoors/{z}/{x}/{y}.png?apikey=c7f381d4cb7244278184ac0663f9d6b9', {
      maxZoom: 22,
      attribution: '&copy; OpenCycleMap & Thunderforest'
  }).addTo(map);

  var Glasgow = {
    "type": "FeatureCollection",
    "features": [
      {
        "type": "Feature",
        "geometry": {
          "type": "Point",
          "coordinates": [-4.2518, 55.8642]
        }
      }
    ]
  };

  L.geoJSON(Glasgow, {
    style: {
      color: "red",
      weight: 4,
      fillColor: "orange",
      fillOpacity: 0.5
    }
  }).addTo(map);

</script>

</body>
</html>
